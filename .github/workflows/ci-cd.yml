name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── Step 1: Run tests ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── Step 2: Build & push Docker image ──────────────
  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Step 3: Deploy to NUC ──────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to NUC
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NUC_HOST }}
          username: ${{ secrets.NUC_USER }}
          key: ${{ secrets.NUC_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE }}:latest
            docker stop trading-bot 2>/dev/null || true
            docker rm trading-bot 2>/dev/null || true
            docker run -d \
              --name trading-bot \
              --restart unless-stopped \
              -e TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }} \
              -e TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }} \
              -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
              -e HEALTHCHECK_URL=${{ secrets.HEALTHCHECK_URL }} \
              -e MIN_DELTA=0.15 \
              -e MAX_DELTA=0.20 \
              -e RISK_FREE_RATE=0.04 \
              ${{ env.IMAGE }}:latest

  # ── Alert on failure ───────────────────────────────
  notify:
    needs: [test, build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram alert
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="🚨 *CI/CD Pipeline Failed*%0A%0ARepo: safe-yield-stock-bot%0ABranch: ${{ github.ref_name }}%0ACommit: \`${{ github.sha }}\`%0ARun: [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
