name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── Step 1: Run tests ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── Step 2: Build & push Docker image ──────────────
  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Step 3: Deploy to NUC ──────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NUC
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NUC_HOST }}
          username: ${{ secrets.NUC_USER }}
          key: ${{ secrets.NUC_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull ${{ env.IMAGE }}:latest
            # Stop old container, start new one
            docker stop trading-bot 2>/dev/null || true
            docker rm trading-bot 2>/dev/null || true
            docker run -d \
              --name trading-bot \
              --restart unless-stopped \
              --env-file ~/trading-bot.env \
              ${{ env.IMAGE }}:latest
